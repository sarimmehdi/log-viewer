name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality-assurance:
    name: Lint, Build, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-node: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter and Formatter
        run: npm run lint

      - name: Build Project
        run: npm run build

      - name: Execute Unit and UI Tests
        run: npm run test:coverage
